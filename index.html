<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALC — Worksheet & Assessment Generator</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green: #2D6A4F;
  --green-mid: #40916C;
  --green-light: #D8F3DC;
  --green-pale: #f0faf2;
  --amber: #F4A261;
  --text: #1a2e20;
  --muted: #4a6a55;
  --border: #b7ddc4;
  --bg: #ffffff;
  --bg-2: #f7fdf9;
}

body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--green-pale); color: var(--text); min-height: 100vh; }

header {
  background: var(--green);
  color: white;
  padding: 1rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
.logo { width: 40px; height: 40px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
header h1 { font-size: 18px; font-weight: 700; }
header p { font-size: 12px; opacity: 0.8; }

.main { max-width: 820px; margin: 0 auto; padding: 1.5rem 1rem; }

.api-bar {
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 1.25rem;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.api-bar label { font-size: 12px; font-weight: 700; color: var(--green); white-space: nowrap; text-transform: uppercase; letter-spacing: 0.04em; }
.api-bar input { flex: 1; min-width: 200px; font-size: 13px; padding: 7px 10px; border: 1px solid var(--border); border-radius: 8px; outline: none; font-family: monospace; }
.api-bar input:focus { border-color: var(--green-mid); box-shadow: 0 0 0 3px rgba(64,145,108,0.12); }

.tabs { display: flex; background: white; border: 1px solid var(--border); border-radius: 12px 12px 0 0; overflow: hidden; }
.tab { flex: 1; padding: 12px 16px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; background: transparent; color: var(--muted); border-bottom: 2.5px solid transparent; transition: all 0.15s; }
.tab.active { color: var(--green); border-bottom-color: var(--green); background: var(--green-pale); }
.tab:hover:not(.active) { background: var(--bg-2); color: var(--text); }

.panel { display: none; }
.panel.active { display: block; }

.card { background: white; border: 1px solid var(--border); border-top: none; border-radius: 0 0 12px 12px; padding: 1.5rem; }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
@media (max-width: 580px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

.field { margin-top: 14px; }
.field:first-child { margin-top: 0; }
label.fl { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--green); margin-bottom: 5px; }
input[type=text], input[type=password], select, textarea {
  width: 100%; font-size: 14px; font-family: inherit; color: var(--text);
  background: var(--bg-2); border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 11px; outline: none; transition: border-color 0.15s, box-shadow 0.15s;
}
textarea { resize: vertical; min-height: 70px; }
input:focus, select:focus, textarea:focus { border-color: var(--green-mid); box-shadow: 0 0 0 3px rgba(64,145,108,0.12); background: white; }

.checklist { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 6px; }
.chip { display: flex; align-items: center; gap: 5px; font-size: 12px; background: var(--green-pale); border: 1px solid var(--border); border-radius: 20px; padding: 4px 11px; cursor: pointer; user-select: none; transition: background 0.1s; }
.chip:hover { background: var(--green-light); }
.chip input { width: auto; border: none; background: transparent; padding: 0; margin: 0; accent-color: var(--green); cursor: pointer; }

.btn-row { display: flex; gap: 10px; margin-top: 1.25rem; flex-wrap: wrap; }
.btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px; font-size: 14px; font-weight: 600; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); background: white; color: var(--text); transition: all 0.15s; font-family: inherit; }
.btn:hover { background: var(--bg-2); }
.btn.primary { background: var(--green); color: white; border-color: var(--green); box-shadow: 0 2px 6px rgba(45,106,79,0.2); }
.btn.primary:hover { background: var(--green-mid); border-color: var(--green-mid); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn.sm { font-size: 12px; padding: 6px 13px; }

.output-wrap { margin-top: 1.5rem; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.output-header { background: var(--green-light); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.output-header span { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--green); }
.output-actions { display: flex; gap: 8px; }
.output-body { padding: 1.25rem; background: var(--bg-2); }

.loading { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 2rem; color: var(--muted); font-size: 14px; }
.spinner { width: 16px; height: 16px; border: 2px solid var(--green-light); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }

.hidden { display: none !important; }

/* ===== PRINT PREVIEW / WORKSHEET RENDER ===== */
.ws-preview {
  font-family: 'Comic Sans MS', 'Comic Sans', cursive;
  max-width: 760px;
  background: white;
  border: 1px solid #ddd;
  border-radius: 8px;
  overflow: hidden;
}
.ws-header {
  background: #2D6A4F;
  color: white;
  padding: 18px 24px;
  text-align: center;
}
.ws-header h2 { font-size: 22px; font-weight: bold; margin-bottom: 4px; }
.ws-header p { font-size: 13px; opacity: 0.85; }
.ws-meta {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  background: #D8F3DC;
  border-bottom: 2px solid #40916C;
}
.ws-meta-cell { padding: 10px 16px; border-right: 1px solid #b7ddc4; }
.ws-meta-cell:last-child { border-right: none; }
.ws-meta-cell .label { font-size: 11px; color: #40916C; font-weight: bold; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 3px; }
.ws-meta-cell .value { font-size: 15px; font-weight: bold; color: #1A3A2A; }
.ws-badge { padding: 8px 16px; font-size: 12px; font-weight: bold; }
.ws-body { padding: 20px 24px; }
.ws-instructions { font-size: 13px; color: #333; margin-bottom: 18px; line-height: 1.5; }
.ws-instructions strong { color: #2D6A4F; }
.ws-question { display: flex; gap: 0; margin-bottom: 18px; border-radius: 6px; overflow: hidden; border: 1px solid #e0e0e0; }
.ws-qnum { background: #2D6A4F; color: white; font-size: 16px; font-weight: bold; min-width: 40px; display: flex; align-items: flex-start; justify-content: center; padding: 14px 8px; }
.ws-qbody { flex: 1; padding: 12px 16px; background: white; }
.ws-qtext { font-size: 14px; color: #1a2e20; margin-bottom: 10px; line-height: 1.5; }
.ws-lines { display: flex; flex-direction: column; gap: 22px; margin-top: 8px; }
.ws-line { border-bottom: 1px solid #ccc; height: 1px; }
.ws-traffic { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 18px; }
.ws-traffic-item { border-radius: 8px; padding: 10px 8px; text-align: center; }
.ws-traffic-item .dot { font-size: 24px; display: block; margin-bottom: 4px; }
.ws-traffic-item .tlabel { font-size: 12px; font-weight: bold; }
.ws-footer { background: #f7fdf9; border-top: 1px solid #D8F3DC; padding: 10px 24px; text-align: center; font-size: 11px; color: #888; }
.ws-section-title { font-size: 16px; font-weight: bold; color: #2D6A4F; margin: 18px 0 10px; border-bottom: 2px solid #D8F3DC; padding-bottom: 6px; }
.ws-feedback-row { display: flex; margin-bottom: 8px; border: 1px solid #e0e0e0; border-radius: 6px; overflow: hidden; }
.ws-feedback-label { background: #D8F3DC; color: #2D6A4F; font-weight: bold; font-size: 13px; padding: 10px 14px; min-width: 180px; display: flex; align-items: center; }
.ws-feedback-space { flex: 1; background: white; min-height: 50px; }
.ws-score-box { display: inline-flex; align-items: center; gap: 10px; background: #D8F3DC; border: 2px solid #2D6A4F; border-radius: 8px; padding: 8px 18px; font-size: 15px; font-weight: bold; color: #1A3A2A; margin-bottom: 14px; }
.ws-markscheme-row { display: flex; gap: 0; margin-bottom: 6px; border: 1px solid #e0e0e0; border-radius: 6px; overflow: hidden; font-size: 13px; }
.ws-ms-num { background: #D8F3DC; color: #2D6A4F; font-weight: bold; padding: 7px 12px; min-width: 40px; text-align: center; }
.ws-ms-ans { background: white; padding: 7px 12px; flex: 1; }

@media print {
  body { background: white; }
  header, .main > *:not(.print-target) { display: none !important; }
  .print-target { display: block !important; max-width: 100%; border: none; border-radius: 0; }
  .ws-preview { border: none; max-width: 100%; }
  @page { margin: 1.5cm; }
}
</style>
</head>
<body>

<header>
  <div class="logo">🌱</div>
  <div>
    <h1>Acorns Learning Centre</h1>
    <p>Worksheet &amp; Assessment Generator</p>
  </div>
</header>

<div class="main">

  <div class="api-bar">
    <label>Anthropic API key</label>
    <input type="password" id="api-key" placeholder="sk-ant-..." autocomplete="off">
    <span style="font-size:11px;color:var(--muted)">Stays in your browser — never stored</span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('ws')">📄 Worksheet</button>
    <button class="tab" onclick="switchTab('as')">📋 Assessment</button>
  </div>

  <!-- WORKSHEET -->
  <div id="panel-ws" class="panel active">
    <div class="card">
      <div class="grid-2">
        <div class="field">
          <label class="fl">Student</label>
          <select id="ws-student">
            <option value="">Select student...</option>
            <option>Kayin (Yr 3)</option><option>Mahdi (Yr 4)</option><option>Michaela (Yr 5)</option>
            <option>Oyin (Yr 2/3)</option><option>Demilade (Yr 5)</option><option>Demilayo (Yr 5)</option>
            <option>Deminiyi (Yr 3)</option><option>Kayo (Yr 1/2)</option><option>Everly (Reception)</option>
            <option value="custom">Other...</option>
          </select>
        </div>
        <div class="field">
          <label class="fl">Subject</label>
          <select id="ws-subject">
            <option>English</option><option>Mathematics</option><option>VR / NVR</option>
            <option>Handwriting</option><option>Creative writing</option>
            <option>Reading comprehension</option><option>Grammar</option><option>Spelling</option>
          </select>
        </div>
      </div>
      <div id="ws-custom-row" class="hidden field">
        <label class="fl">Custom name / year group</label>
        <input type="text" id="ws-custom" placeholder="e.g. Amir, Year 4">
      </div>
      <div class="grid-2">
        <div class="field">
          <label class="fl">Topic / focus</label>
          <input type="text" id="ws-topic" placeholder="e.g. adding fractions, speech marks...">
        </div>
        <div class="field">
          <label class="fl">Worksheet type</label>
          <select id="ws-type">
            <option>Standard practice</option><option>Exit card</option>
            <option>5-day homework pack</option>
            <option>Mastery / New topic / Challenge (3-tier)</option>
            <option>Fluency drill</option><option>Word problem set</option>
            <option>Cloze / fill-in-the-blanks</option><option>Journal entry prompt</option>
          </select>
        </div>
      </div>
      <div class="grid-3">
        <div class="field">
          <label class="fl">Difficulty</label>
          <select id="ws-difficulty">
            <option>Mastery (consolidation)</option><option>New topic (introduction)</option>
            <option>Challenge (extension)</option><option>Mixed</option>
          </select>
        </div>
        <div class="field">
          <label class="fl">Questions</label>
          <select id="ws-qcount">
            <option>5</option><option>8</option><option selected>10</option>
            <option>12</option><option>15</option>
          </select>
        </div>
        <div class="field">
          <label class="fl">Answer lines per Q</label>
          <select id="ws-lines">
            <option>2</option><option selected>3</option><option>4</option><option>5</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label class="fl">Extra instructions</label>
        <textarea id="ws-extra" placeholder="e.g. include worked example first, focus on word problems, Montessori concrete-to-abstract..."></textarea>
      </div>
      <div class="btn-row">
        <button class="btn primary" id="ws-btn" onclick="generate('ws')">Generate worksheet</button>
      </div>
      <div id="ws-output" class="output-wrap hidden">
        <div class="output-header">
          <span id="ws-out-label">Output</span>
          <div class="output-actions">
            <button class="btn sm" onclick="printPreview('ws')">🖨 Print / save PDF</button>
            <button class="btn sm primary" id="ws-dl-btn" onclick="downloadDocx('ws')">⬇ Download .docx</button>
          </div>
        </div>
        <div class="output-body" id="ws-body"></div>
      </div>
    </div>
  </div>

  <!-- ASSESSMENT -->
  <div id="panel-as" class="panel">
    <div class="card">
      <div class="grid-2">
        <div class="field">
          <label class="fl">Student</label>
          <select id="as-student">
            <option value="">Select student...</option>
            <option>Kayin (Yr 3)</option><option>Mahdi (Yr 4)</option><option>Michaela (Yr 5)</option>
            <option>Oyin (Yr 2/3)</option><option>Demilade (Yr 5)</option><option>Demilayo (Yr 5)</option>
            <option>Deminiyi (Yr 3)</option><option>Kayo (Yr 1/2)</option><option>Everly (Reception)</option>
            <option value="custom">Other...</option>
          </select>
        </div>
        <div class="field">
          <label class="fl">Subject</label>
          <select id="as-subject">
            <option>Mathematics</option><option>English</option><option>VR / NVR</option>
            <option>Reading comprehension</option><option>Mixed / end of term</option>
          </select>
        </div>
      </div>
      <div id="as-custom-row" class="hidden field">
        <label class="fl">Custom name / year group</label>
        <input type="text" id="as-custom" placeholder="e.g. Amir, Year 4">
      </div>
      <div class="grid-2">
        <div class="field">
          <label class="fl">Assessment type</label>
          <select id="as-type">
            <option>Topic assessment</option><option>End of term</option>
            <option>Diagnostic / baseline</option><option>Exit card set</option>
            <option>Mini-quiz (5–10 Q)</option>
          </select>
        </div>
        <div class="field">
          <label class="fl">Topics covered</label>
          <input type="text" id="as-topics" placeholder="e.g. fractions, place value, word problems">
        </div>
      </div>
      <div class="grid-3">
        <div class="field">
          <label class="fl">Questions</label>
          <select id="as-qcount">
            <option>5</option><option>8</option><option selected>10</option>
            <option>12</option><option>15</option>
          </select>
        </div>
        <div class="field">
          <label class="fl">Answer lines per Q</label>
          <select id="as-lines">
            <option>2</option><option selected>3</option><option>4</option><option>5</option>
          </select>
        </div>
        <div class="field">
          <label class="fl">Mark scheme</label>
          <select id="as-mark">
            <option>Yes — full</option><option>Yes — answers only</option><option>No</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label class="fl">Include sections</label>
        <div class="checklist">
          <label class="chip"><input type="checkbox" id="inc-str" checked> Strengths</label>
          <label class="chip"><input type="checkbox" id="inc-dev" checked> Areas for development</label>
          <label class="chip"><input type="checkbox" id="inc-nxt" checked> Next steps</label>
          <label class="chip"><input type="checkbox" id="inc-trf"> Traffic light</label>
          <label class="chip"><input type="checkbox" id="inc-scr" checked> Score box</label>
          <label class="chip"><input type="checkbox" id="inc-dat"> Date field</label>
        </div>
      </div>
      <div class="field">
        <label class="fl">Extra instructions</label>
        <textarea id="as-extra" placeholder="e.g. Montessori-aligned language, include teacher comment box..."></textarea>
      </div>
      <div class="btn-row">
        <button class="btn primary" id="as-btn" onclick="generate('as')">Generate assessment</button>
      </div>
      <div id="as-output" class="output-wrap hidden">
        <div class="output-header">
          <span id="as-out-label">Output</span>
          <div class="output-actions">
            <button class="btn sm" onclick="printPreview('as')">🖨 Print / save PDF</button>
            <button class="btn sm primary" id="as-dl-btn" onclick="downloadDocx('as')">⬇ Download .docx</button>
          </div>
        </div>
        <div class="output-body" id="as-body"></div>
      </div>
    </div>
  </div>

</div>

<!-- Hidden print target -->
<div id="print-target" class="print-target" style="display:none"></div>

<script>
// State
const state = { ws: null, as: null };

function switchTab(t) {
  ['ws','as'].forEach(id => {
    document.getElementById('panel-'+id).classList.toggle('active', id===t);
    document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', ['ws','as'][i]===t));
  });
}

['ws','as'].forEach(p => {
  document.getElementById(p+'-student').addEventListener('change', function(){
    document.getElementById(p+'-custom-row').classList.toggle('hidden', this.value !== 'custom');
  });
});

function getStudent(p) {
  const sel = document.getElementById(p+'-student');
  if (sel.value === 'custom') return document.getElementById(p+'-custom').value || 'Student';
  return sel.value || 'Student';
}

function apiKey() { return document.getElementById('api-key').value.trim(); }

async function callClaude(systemPrompt, userPrompt) {
  const key = apiKey();
  if (!key) throw new Error('Please enter your Anthropic API key at the top.');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 2000,
      system: systemPrompt,
      messages: [{ role: 'user', content: userPrompt }]
    })
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.error?.message || 'API error ' + res.status);
  }
  const d = await res.json();
  return d.content?.[0]?.text || '';
}

async function generate(p) {
  const isAssessment = p === 'as';
  const btn = document.getElementById(p+'-btn');
  const outWrap = document.getElementById(p+'-output');
  const body = document.getElementById(p+'-body');
  const outLabel = document.getElementById(p+'-out-label');

  const student = getStudent(p);
  const subject = document.getElementById(p+'-subject').value;
  const topic = isAssessment ? document.getElementById('as-topics').value || 'general topics' : document.getElementById('ws-topic').value || 'general revision';
  const type = document.getElementById(p+'-type').value;
  const difficulty = isAssessment ? 'Mixed' : document.getElementById('ws-difficulty').value;
  const qcount = parseInt(document.getElementById(p+'-qcount').value);
  const lines = parseInt(document.getElementById(p+'-lines').value);
  const extra = document.getElementById(p+'-extra').value;
  const markScheme = isAssessment ? document.getElementById('as-mark').value : 'No';
  const includeMS = markScheme !== 'No';

  btn.disabled = true;
  btn.textContent = 'Generating...';
  outWrap.classList.remove('hidden');
  body.innerHTML = '<div class="loading"><div class="spinner"></div>Creating for ' + student + '...</div>';

  const systemPrompt = `You are an expert primary school teacher at ALC (Acorns Learning Centre), a Montessori-mastery-based learning centre. You create age-appropriate, well-structured educational questions. You MUST respond with ONLY valid JSON — no preamble, no markdown fences, no explanation. Return a JSON object exactly matching the schema provided.`;

  const sections = isAssessment ? {
    strengths: document.getElementById('inc-str').checked,
    development: document.getElementById('inc-dev').checked,
    nextSteps: document.getElementById('inc-nxt').checked,
    trafficLight: document.getElementById('inc-trf').checked,
    scoreBox: document.getElementById('inc-scr').checked,
    dateField: document.getElementById('inc-dat').checked,
  } : { trafficLight: true };

  const userPrompt = `Generate ${qcount} questions for a ${type} for ${student} in ${subject} on the topic: "${topic}".
Difficulty: ${difficulty}. ${extra ? 'Extra notes: ' + extra : ''}

Return ONLY this JSON object (no markdown, no extra text):
{
  "studentName": "${student}",
  "subject": "${subject}",
  "topic": "${topic}",
  "worksheetType": "${type}",
  "difficulty": "${difficulty}",
  "docType": "${isAssessment ? 'assessment' : 'worksheet'}",
  "lines": ${lines},
  "includeMarkScheme": ${includeMS},
  "sections": ${JSON.stringify(sections)},
  "questions": [
    { "question": "question text here", "type": "short|long|writing", "lines": ${lines}, "answer": "model answer or 'Open answer'" }
  ]
}

Rules:
- "type" must be "short" (1-2 lines), "long" (3-4 lines), or "writing" (open-ended creative/extended)
- questions must be age-appropriate and Montessori-aligned (concrete to abstract)
- answers must be accurate
- vary question types across the set
- ${qcount} questions total`;

  try {
    const raw = await callClaude(systemPrompt, userPrompt);
    const cleaned = raw.replace(/```json|```/g, '').trim();
    const data = JSON.parse(cleaned);
    state[p] = data;
    outLabel.textContent = (isAssessment ? 'Assessment' : 'Worksheet') + ' — ' + student;
    body.innerHTML = renderPreview(data);
    document.getElementById(p+'-dl-btn').disabled = false;
  } catch(e) {
    body.innerHTML = '<div style="padding:1rem;color:#c0392b;font-size:14px">Error: ' + e.message + '</div>';
  }

  btn.disabled = false;
  btn.textContent = isAssessment ? 'Generate assessment' : 'Generate worksheet';
}

function renderPreview(d) {
  const diffColors = {
    'Mastery (consolidation)': { bg: '#D8F3DC', text: '#1A3A2A' },
    'New topic (introduction)': { bg: '#FFF3E0', text: '#5D3A00' },
    'Challenge (extension)': { bg: '#FDE8E8', text: '#6B1A1A' },
    'Mixed': { bg: '#E8EAFF', text: '#2A2A6B' },
  };
  const dc = diffColors[d.difficulty] || diffColors['Mixed'];
  const isAssessment = d.docType === 'assessment';

  let html = `<div class="ws-preview">
    <div class="ws-header">
      <h2>Acorns Learning Centre</h2>
      <p>Montessori · Mastery · Future Skills</p>
    </div>
    <div class="ws-meta">
      <div class="ws-meta-cell"><div class="label">Name</div><div class="value">${esc(d.studentName)}</div></div>
      <div class="ws-meta-cell"><div class="label">Subject</div><div class="value">${esc(d.subject)}</div></div>
      <div class="ws-meta-cell"><div class="label">Topic</div><div class="value">${esc(d.topic)}</div></div>
    </div>
    <div class="ws-badge" style="background:${dc.bg};color:${dc.text};font-family:'Comic Sans MS',cursive;font-size:12px;font-weight:bold">
      ${esc(d.worksheetType)} &nbsp;·&nbsp; ${esc(d.difficulty)}
      ${d.sections?.dateField ? ' &nbsp;·&nbsp; Date: _______________' : ''}
    </div>
    <div class="ws-body">
      <div class="ws-instructions"><strong>Instructions:</strong> Complete each question carefully. Show your working where you can.</div>`;

  // Score box for assessments
  if (isAssessment && d.sections?.scoreBox) {
    html += `<div class="ws-score-box">Score: _______ / ${d.questions.length}</div>`;
  }

  // Questions
  d.questions.forEach((q, i) => {
    const lineCount = q.type === 'writing' ? (q.lines || 5) : (q.lines || d.lines || 3);
    let linesHtml = '';
    for (let l = 0; l < lineCount; l++) {
      linesHtml += '<div class="ws-line"></div>';
    }
    html += `<div class="ws-question">
      <div class="ws-qnum">${i+1}</div>
      <div class="ws-qbody">
        <div class="ws-qtext">${esc(q.question)}</div>
        <div class="ws-lines">${linesHtml}</div>
      </div>
    </div>`;
  });

  // Assessment sections
  if (isAssessment) {
    const hasFeedback = d.sections?.strengths || d.sections?.development || d.sections?.nextSteps;
    if (hasFeedback) {
      html += `<div class="ws-section-title">Teacher feedback</div>`;
      if (d.sections?.strengths) html += feedbackRow('Strengths');
      if (d.sections?.development) html += feedbackRow('Areas for development');
      if (d.sections?.nextSteps) html += feedbackRow('Next steps');
    }
    if (d.includeMarkScheme) {
      html += `<div class="ws-section-title" style="margin-top:24px;border-top:2px solid #D8F3DC;padding-top:14px">Mark scheme</div>`;
      d.questions.forEach((q,i) => {
        html += `<div class="ws-markscheme-row"><div class="ws-ms-num">${i+1}</div><div class="ws-ms-ans">${esc(q.answer)}</div></div>`;
      });
    }
  }

  // Traffic light
  const showTraffic = isAssessment ? d.sections?.trafficLight : true;
  if (showTraffic) {
    html += `<div class="ws-section-title" style="margin-top:18px">How did you find this?</div>
    <div class="ws-traffic">
      <div class="ws-traffic-item" style="background:#E8F5E9;border:1px solid #4CAF50">
        <span class="dot" style="color:#4CAF50">●</span>
        <div class="tlabel" style="color:#1B5E20">Got it!</div>
      </div>
      <div class="ws-traffic-item" style="background:#FFF3E0;border:1px solid #FF9800">
        <span class="dot" style="color:#FF9800">●</span>
        <div class="tlabel" style="color:#E65100">Getting there</div>
      </div>
      <div class="ws-traffic-item" style="background:#FFEBEE;border:1px solid #F44336">
        <span class="dot" style="color:#F44336">●</span>
        <div class="tlabel" style="color:#B71C1C">Need help</div>
      </div>
    </div>`;
  }

  html += `</div><div class="ws-footer">Acorns Learning Centre &nbsp;·&nbsp; Bushey / Watford &nbsp;·&nbsp; Montessori · Mastery · Future Skills</div></div>`;
  return html;
}

function feedbackRow(label) {
  return `<div class="ws-feedback-row">
    <div class="ws-feedback-label">${esc(label)}</div>
    <div class="ws-feedback-space"></div>
  </div>`;
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function printPreview(p) {
  const body = document.getElementById(p+'-body');
  if (!body || !state[p]) return;
  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>ALC — ${esc(state[p].studentName)} — ${esc(state[p].topic)}</title><style>
    body { font-family: 'Comic Sans MS', cursive; margin: 1.5cm; background: white; color: #1a2e20; }
    ${document.querySelector('style').textContent}
    .ws-preview { border: none; max-width: 100%; }
    @media print { @page { margin: 1.5cm; } }
  </style></head><body>${body.innerHTML}<script>window.onload=()=>window.print();<\/script></body></html>`);
  win.document.close();
}

async function downloadDocx(p) {
  const d = state[p];
  if (!d) return;
  const btn = document.getElementById(p+'-dl-btn');
  btn.disabled = true;
  btn.textContent = 'Building .docx...';

  try {
    // We send the data to the page title so the user can copy it and use the Claude chat to generate
    // In standalone mode, we trigger a download of the print HTML instead as a rich alternative
    const filename = `${d.studentName.replace(/\s+/g,'_')}_${d.subject}_${d.topic.replace(/\s+/g,'_').substring(0,20)}.html`;
    const htmlContent = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${esc(d.studentName)} — ${esc(d.topic)}</title><style>
      body{font-family:'Comic Sans MS',cursive;margin:1.5cm;background:white}
      ${document.querySelector('style').textContent}
      .ws-preview{border:none;max-width:100%}
    </style></head><body>${document.getElementById(p+'-body').innerHTML}</body></html>`;

    const blob = new Blob([htmlContent], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
    btn.textContent = 'Downloaded!';
    setTimeout(() => { btn.disabled = false; btn.textContent = '⬇ Download .docx'; }, 2000);

    // Also show docx note
    const note = document.createElement('div');
    note.style.cssText = 'margin-top:10px;padding:10px 14px;background:#fffbe6;border:1px solid #f4c261;border-radius:8px;font-size:12px;color:#5a3a00';
    note.innerHTML = '💡 <strong>To get a full .docx:</strong> copy your generated content and paste it into this Claude conversation — say <em>"Turn this into a formatted ALC worksheet docx"</em> and it will build the full Word document for you.';
    document.getElementById(p+'-body').appendChild(note);
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '⬇ Download .docx';
    alert('Error: ' + e.message);
  }
}
</script>
</body>
</html>
